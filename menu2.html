<head>

    <title>Inicio de sesión</title>
<style>
    div{
        border: 1px solid black;
        display: block; /*comportamiento del tag*/
    }
    label{
        display: block;
    }

    input{
        display: block;
        align-content: center;
        width: 40%;

    }
    /*seccion de selector de clase --->repiten */

    .titulo_texto{

    }

        background: linear-gradient(to bottom, #e0d5d5, #ffffff);

        align-self: center;
        vertical-align: middle;

    #contenedor_texto{

    }

        width: 250px;
        margin:5 auto;
        text-align: center;
        align-content: center;
        border: 4px solid #ff0000
    }
    #imagen_perfil video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    } 

    </style>
</head>

                </div>
